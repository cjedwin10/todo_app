{% extends "base.html" %}

{% block title %}Add Task{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 0 auto;">
    <h2 style="margin-bottom: 24px;">Add New Task</h2>
    
    <form method="POST">
        <div class="form-group">
            <label for="title">Task Description</label>
            <input type="text" id="title" name="title" placeholder="e.g., Buy groceries" required>
        </div>
        
        <div class="form-group">
            <label for="task_time">Time</label>
            <input type="time" id="task_time" name="task_time" required>
        </div>
        
        <button type="submit" class="btn">Add Task</button>
        <a href="{{ url_for('index') }}" class="btn btn-secondary" style="text-align: center;">Cancel</a>
    </form>
</div>
{% endblock %}
